name: Release binaries

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      source-ref:
        description: Exact 40-character private source commit SHA to build.
        required: true
        type: string
      tag:
        description: Public release tag, e.g. v0.1.105.
        required: true
        type: string
      channel:
        description: Release channel.
        required: true
        default: stable
        type: choice
        options:
          - stable
          - next
      draft:
        description: Create/update the GitHub Release as draft.
        required: true
        default: true
        type: boolean
      platforms:
        description: Comma-separated matrix labels to build. Add windows-x64 only when a Windows runner exists.
        required: true
        default: linux-x64,macos-arm64
        type: string
      artifact-run-id:
        description: Optional prior release workflow run whose already-uploaded artifacts should be recovered after their source and build evidence are verified.
        required: false
        default: ""
        type: string

permissions:
  actions: read
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: release-binaries-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.sha }}
  cancel-in-progress: false

jobs:
  validate:
    name: validate release repository metadata
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Verify public release docs
        shell: bash
        run: |
          set -euo pipefail
          test -f README.md
          test -f LICENSE
          test -f EULA.md
          grep -q "tetsuo-ai/agenc-marketplace-releases" README.md
          grep -q "official \`tetsuo-ai\` GitHub Actions release lane" README.md

  # The matrix context is not available in job-level `if`, so the platform
  # filter lives in this tiny plan job: it turns the `platforms` input into
  # the matrix include list. Legs whose runners do not exist (e.g.
  # windows-x64 while hosted runners are billing-blocked) are simply never
  # scheduled, so `needs: build` stays green for the manifest job.
  plan:
    name: plan build matrix
    if: github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 5
    outputs:
      include: ${{ steps.plan.outputs.include }}
    steps:
      - id: plan
        shell: bash
        env:
          PLATFORMS: ${{ inputs.platforms }}
        run: |
          set -euo pipefail
          include="$(python3 - <<'PYEOF'
          import json, os
          legs = [
              {"label": "linux-x64", "runner": ["self-hosted", "Linux", "X64"],
               "artifact": "agenc-marketplace-linux-x64"},
              {"label": "windows-x64", "runner": "windows-latest",
               "artifact": "agenc-marketplace-windows-x64.exe"},
              {"label": "macos-arm64", "runner": ["self-hosted", "macOS", "ARM64"],
               "artifact": "agenc-marketplace-macos-arm64"},
          ]
          wanted = {p.strip() for p in os.environ["PLATFORMS"].split(",") if p.strip()}
          print(json.dumps([leg for leg in legs if leg["label"] in wanted]))
          PYEOF
          )"
          echo "include=${include}" >> "$GITHUB_OUTPUT"
          echo "planned matrix: ${include}"

  source-gates:
    name: validate exact private source
    if: github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 35
    permissions:
      contents: read
    steps:
      - name: Require an immutable source commit
        shell: bash
        env:
          SOURCE_REF: ${{ inputs.source-ref }}
        run: |
          set -euo pipefail
          if [[ ! "${SOURCE_REF}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::source-ref must be an exact 40-character lowercase commit SHA"
            exit 1
          fi

      - name: Checkout private source
        uses: actions/checkout@v4
        with:
          repository: tetsuo-ai/agenc-marketplace-agent-kit
          ref: ${{ inputs.source-ref }}
          token: ${{ secrets.AGENC_SOURCE_READ_TOKEN }}
          persist-credentials: false
          fetch-depth: 0
          path: source

      - name: Verify source identity and release version
        shell: bash
        working-directory: source
        env:
          SOURCE_REF: ${{ inputs.source-ref }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${SOURCE_REF}"
          node -e '
            const fs = require("node:fs");
            const version = JSON.parse(fs.readFileSync("packages/kit/package.json", "utf8")).version;
            const expected = process.env.RELEASE_TAG.replace(/^v/, "");
            if (version !== expected) {
              throw new Error(`source package version ${version} does not match release tag ${process.env.RELEASE_TAG}`);
            }
          '

      - name: Setup pinned Node runtime
        uses: actions/setup-node@v4
        with:
          node-version: 22.23.1
          cache: npm
          cache-dependency-path: source/package-lock.json

      - name: Pin declared npm toolchain
        run: npm install --global npm@11.18.0

      - name: Install without lifecycle scripts
        working-directory: source
        run: npm ci --ignore-scripts

      - name: Run complete source validation gate
        working-directory: source
        run: npm run validate

      - name: Run production dependency and license audit policy
        working-directory: source
        run: npm run audit:prod

  build:
    name: build / ${{ matrix.label }}
    if: inputs.artifact-run-id == ''
    needs: [plan, source-gates]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.plan.outputs.include) }}

    steps:
      - name: Checkout private source
        uses: actions/checkout@v4
        with:
          repository: tetsuo-ai/agenc-marketplace-agent-kit
          ref: ${{ inputs.source-ref }}
          token: ${{ secrets.AGENC_SOURCE_READ_TOKEN }}
          persist-credentials: false
          fetch-depth: 0
          path: source

      - name: Setup Node 22.23.1 with npm cache
        if: runner.os != 'macOS'
        uses: actions/setup-node@v4
        with:
          node-version: 22.23.1
          cache: npm
          cache-dependency-path: source/package-lock.json

      # The remote macOS runner can spend longer saving setup-node's npm
      # cache than it spends building the binary. That post-job cleanup can
      # exhaust the job timeout after the verified artifact is uploaded.
      - name: Setup Node 22.23.1 without npm cache
        if: runner.os == 'macOS'
        uses: actions/setup-node@v4
        with:
          node-version: 22.23.1

      - name: Pin declared npm toolchain
        run: npm install --global npm@11.18.0

      - name: Install without lifecycle scripts
        working-directory: source
        run: npm ci --ignore-scripts

      - name: Build workspace
        working-directory: source
        run: npm run build

      - name: Build SEA binary
        working-directory: source
        run: npm run build:sea

      - name: Smoke test binary
        shell: bash
        working-directory: source
        run: |
          set -euo pipefail
          "./release-artifacts/${{ matrix.artifact }}" --version
          "./release-artifacts/${{ matrix.artifact }}" --help

      - name: Prepare artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p public-artifacts
          cp "source/release-artifacts/${{ matrix.artifact }}" "public-artifacts/${{ matrix.artifact }}"
          if [[ "${{ runner.os }}" != "Windows" ]]; then
            chmod 0755 "public-artifacts/${{ matrix.artifact }}"
          fi
          if command -v shasum >/dev/null 2>&1; then
            shasum -a 256 "public-artifacts/${{ matrix.artifact }}" > "public-artifacts/${{ matrix.artifact }}.sha256"
          else
            sha256sum "public-artifacts/${{ matrix.artifact }}" > "public-artifacts/${{ matrix.artifact }}.sha256"
          fi

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            public-artifacts/${{ matrix.artifact }}
            public-artifacts/${{ matrix.artifact }}.sha256
          retention-days: 14

  # Build legs only produce and upload verified artifacts. Provenance is
  # centralized on the Linux release runner so every platform is gated by the
  # same Sigstore network path before any GitHub Release is created.
  release-manifest:
    name: release manifest
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' &&
        always() &&
        needs.source-gates.result == 'success' &&
        (
          needs.build.result == 'success' ||
          (inputs.artifact-run-id != '' && needs.build.result == 'skipped')
        )
      }}
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 20
    needs: [source-gates, build]
    permissions:
      actions: read
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout private source
        uses: actions/checkout@v4
        with:
          repository: tetsuo-ai/agenc-marketplace-agent-kit
          ref: ${{ inputs.source-ref }}
          token: ${{ secrets.AGENC_SOURCE_READ_TOKEN }}
          persist-credentials: false
          fetch-depth: 0
          path: source

      - name: Verify recovered run source and build evidence
        if: inputs.artifact-run-id != ''
        env:
          GH_TOKEN: ${{ github.token }}
          ARTIFACT_RUN_ID: ${{ inputs.artifact-run-id }}
          SOURCE_REF: ${{ inputs.source-ref }}
          RELEASE_TAG: ${{ inputs.tag }}
          PLATFORMS: ${{ inputs.platforms }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "${ARTIFACT_RUN_ID}" =~ ^[0-9]+$ ]] || [[ "${ARTIFACT_RUN_ID}" == "${GITHUB_RUN_ID}" ]]; then
            echo "::error::artifact-run-id must identify a completed prior workflow run"
            exit 1
          fi

          run_json="${RUNNER_TEMP}/artifact-run.json"
          jobs_json="${RUNNER_TEMP}/artifact-run-jobs.json"
          artifacts_json="${RUNNER_TEMP}/artifact-run-artifacts.json"
          gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${ARTIFACT_RUN_ID}" > "${run_json}"
          gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${ARTIFACT_RUN_ID}/jobs?per_page=100" > "${jobs_json}"
          gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${ARTIFACT_RUN_ID}/artifacts?per_page=100" > "${artifacts_json}"

          jq -e '
            .event == "workflow_dispatch" and
            .path == ".github/workflows/release-binaries.yml" and
            .status == "completed"
          ' "${run_json}" >/dev/null || {
            echo "::error::artifact run is not a completed release-binaries workflow dispatch"
            exit 1
          }

          source_job_id="$(
            jq -r '
              [
                .jobs[]
                | select(
                    .name == "validate exact private source" and
                    .conclusion == "success"
                  )
                | .id
              ]
              | if length == 1 then .[0] else empty end
            ' "${jobs_json}"
          )"
          if [[ -z "${source_job_id}" ]]; then
            echo "::error::artifact run lacks one successful exact-source validation job"
            exit 1
          fi

          source_log="${RUNNER_TEMP}/artifact-run-source-gate.log"
          gh run view "${ARTIFACT_RUN_ID}" \
            --repo "${GITHUB_REPOSITORY}" \
            --job "${source_job_id}" \
            --log > "${source_log}"
          grep -F "SOURCE_REF: ${SOURCE_REF}" "${source_log}" >/dev/null || {
            echo "::error::artifact run source ref does not match this recovery request"
            exit 1
          }
          grep -F "RELEASE_TAG: ${RELEASE_TAG}" "${source_log}" >/dev/null || {
            echo "::error::artifact run release tag does not match this recovery request"
            exit 1
          }

          IFS=',' read -ra requested_platforms <<< "${PLATFORMS}"
          for raw_platform in "${requested_platforms[@]}"; do
            platform="${raw_platform//[[:space:]]/}"
            case "${platform}" in
              linux-x64)
                artifact="agenc-marketplace-linux-x64"
                ;;
              macos-arm64)
                artifact="agenc-marketplace-macos-arm64"
                ;;
              windows-x64)
                artifact="agenc-marketplace-windows-x64.exe"
                ;;
              *)
                echo "::error::unsupported recovery platform: ${platform}"
                exit 1
                ;;
            esac

            job_name="build / ${platform}"
            for required_step in \
              "Checkout private source" \
              "Build SEA binary" \
              "Smoke test binary" \
              "Prepare artifact" \
              "Upload workflow artifact"; do
              jq -e \
                --arg job "${job_name}" \
                --arg step "${required_step}" \
                'any(.jobs[];
                  .name == $job and
                  any(.steps[]; .name == $step and .conclusion == "success")
                )' \
                "${jobs_json}" >/dev/null || {
                  echo "::error::artifact run lacks successful '${required_step}' evidence for ${platform}"
                  exit 1
                }
            done

            jq -e \
              --arg artifact "${artifact}" \
              'any(.artifacts[]; .name == $artifact and .expired == false)' \
              "${artifacts_json}" >/dev/null || {
                echo "::error::artifact run lacks a live ${artifact} workflow artifact"
                exit 1
              }
          done

      - name: Download newly built artifacts
        if: inputs.artifact-run-id == ''
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/all
          merge-multiple: true

      - name: Download recovered artifacts
        if: inputs.artifact-run-id != ''
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.artifact-run-id }}
          path: release-artifacts/all
          merge-multiple: true

      - name: Verify binary checksums and prepare provenance subjects
        env:
          PLATFORMS: ${{ inputs.platforms }}
        shell: bash
        run: |
          set -euo pipefail
          expected_names=()
          IFS=',' read -ra requested_platforms <<< "${PLATFORMS}"
          for raw_platform in "${requested_platforms[@]}"; do
            platform="${raw_platform//[[:space:]]/}"
            case "${platform}" in
              linux-x64)
                expected_names+=("agenc-marketplace-linux-x64")
                ;;
              macos-arm64)
                expected_names+=("agenc-marketplace-macos-arm64")
                ;;
              windows-x64)
                expected_names+=("agenc-marketplace-windows-x64.exe")
                ;;
              *)
                echo "::error::unsupported release platform: ${platform}"
                exit 1
                ;;
            esac
          done
          mapfile -t expected_names < <(printf '%s\n' "${expected_names[@]}" | sort -u)

          mapfile -t binaries < <(
            find release-artifacts/all \
              -maxdepth 1 \
              -type f \
              -name 'agenc-marketplace-*' \
              ! -name '*.sha256' \
              | sort
          )
          if [[ "${#binaries[@]}" -ne "${#expected_names[@]}" ]]; then
            echo "::error::downloaded binary count does not match requested platforms"
            exit 1
          fi
          for index in "${!binaries[@]}"; do
            if [[ "$(basename "${binaries[index]}")" != "${expected_names[index]}" ]]; then
              echo "::error::downloaded binaries do not exactly match requested platforms"
              exit 1
            fi
          done

          subjects=release-artifacts/binary-subjects.sha256
          : > "${subjects}"
          for binary in "${binaries[@]}"; do
            checksum="${binary}.sha256"
            if [[ ! -f "${checksum}" ]]; then
              echo "::error::missing checksum for ${binary}"
              exit 1
            fi
            expected="$(awk 'NR == 1 { print $1 }' "${checksum}")"
            actual="$(shasum -a 256 "${binary}" | awk '{ print $1 }')"
            if [[ ! "${expected}" =~ ^[0-9a-f]{64}$ || "${actual}" != "${expected}" ]]; then
              echo "::error::checksum mismatch for ${binary}"
              exit 1
            fi
            printf '%s *%s\n' "${actual}" "$(basename "${binary}")" >> "${subjects}"
          done

      - name: Attest binary provenance
        uses: actions/attest@v4
        with:
          subject-checksums: release-artifacts/binary-subjects.sha256

      - name: Generate release manifest
        shell: bash
        run: |
          set -euo pipefail
          node source/scripts/generate-binary-release-manifest.mjs \
            --artifact-root release-artifacts/all \
            --tag "${{ inputs.tag }}" \
            --channel "${{ inputs.channel }}" \
            --source-ref "${{ inputs.source-ref }}" \
            --repository tetsuo-ai/agenc-marketplace-releases \
            --workflow .github/workflows/release-binaries.yml \
            --base-url "https://github.com/tetsuo-ai/agenc-marketplace-releases/releases/download/${{ inputs.tag }}" \
            --out release-artifacts/agenc-marketplace-release-manifest.json
          shasum -a 256 release-artifacts/agenc-marketplace-release-manifest.json > release-artifacts/agenc-marketplace-release-manifest.json.sha256

      - name: Attest manifest provenance
        uses: actions/attest@v4
        with:
          subject-path: release-artifacts/agenc-marketplace-release-manifest.json

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
          DRAFT: ${{ inputs.draft }}
          SOURCE_REF: ${{ inputs.source-ref }}
        shell: bash
        run: |
          set -euo pipefail
          notes="$(cat <<EOF
          Public AgenC Marketplace binary release.

          Source repository: tetsuo-ai/agenc-marketplace-agent-kit
          Source ref: ${SOURCE_REF}

          Verify each artifact with:
            gh attestation verify <artifact> --repo tetsuo-ai/agenc-marketplace-releases
            shasum -a 256 -c <artifact>.sha256
          EOF
          )"

          draft_flag=()
          if [[ "${DRAFT}" == "true" ]]; then
            draft_flag=(--draft)
          fi

          if gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release edit "${TAG}" --repo "${GITHUB_REPOSITORY}" --notes "${notes}"
          else
            gh release create "${TAG}" --repo "${GITHUB_REPOSITORY}" --title "${TAG}" --notes "${notes}" "${draft_flag[@]}"
          fi

          mapfile -t assets < <(find release-artifacts/all -type f -name 'agenc-marketplace-*' | sort)
          gh release upload "${TAG}" --repo "${GITHUB_REPOSITORY}" \
            "${assets[@]}" \
            release-artifacts/agenc-marketplace-release-manifest.json \
            release-artifacts/agenc-marketplace-release-manifest.json.sha256 \
            --clobber
